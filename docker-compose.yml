version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: protest-db
    environment:
      - POSTGRES_USER=protest_user
      - POSTGRES_PASSWORD=protest_pass
      - POSTGRES_DB=protest_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: protest-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: protest-backend
    depends_on:
      - db
      - redis
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://protest_user:protest_pass@db:5432/protest_db?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: protest-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
