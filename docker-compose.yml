version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: protest-db
    environment:
      - POSTGRES_USER=protest_user
      - POSTGRES_PASSWORD=protest_pass
      - POSTGRES_DB=protest_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: protest-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
