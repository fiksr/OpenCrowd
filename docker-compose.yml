version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.5
    platform: linux/arm64
    container_name: protest-db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: protest-redis
    volumes:
      - redisdata:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: protest-backend
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - npm_network

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: protest-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - npm_network

volumes:
  pgdata:
  redisdata:

networks:
  npm_network:
    external: true
    name: npm_default
